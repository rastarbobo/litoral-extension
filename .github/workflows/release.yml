name: Release Extension

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from package.json
        id: version
        run: echo "version=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  build:
    needs: read-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      # Chrome and Firefox builds run in separate jobs because base-build wipes dist/
      # via pnpm clean:bundle; the Firefox .env mutation also must not leak into Chrome.
      - run: pnpm ${{ matrix.browser == 'firefox' && 'zip:firefox' || 'zip' }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.browser }}-build
          path: dist-zip/*

  release:
    needs: [read-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip if tag already exists
        id: tag-check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ needs.read-version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        if: steps.tag-check.outputs.exists != 'true'
        with:
          path: dist-zip
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        if: steps.tag-check.outputs.exists != 'true'
        with:
          tag_name: ${{ needs.read-version.outputs.version }}
          name: ${{ needs.read-version.outputs.version }}
          files: |
            dist-zip/*.zip
            dist-zip/*.xpi
          generate_release_notes: true
