name: Run E2E Tests

on: [ pull_request ]

permissions:
  contents: read

jobs:
  e2e:
    name: E2E tests on ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # WHY chrome is excluded: Chrome 150 + chromedriver 150 (auto-resolved by WDIO v9's
        # @puppeteer/browsers on ubuntu-latest) silently ignores goog:chromeOptions.extensions
        # for MV3 — itemCount=0 + ERR_BLOCKED_BY_CLIENT. see ROADMAP.md Phase 2.3 + upstream
        # Jonghakseo/chrome-extension-boilerplate-react-vite#1013.
        # Firefox E2E continues to run; Chrome E2E runs locally on headed Windows until
        # the chromedriver/Chrome 150 quirk is fixed upstream.
        browser: [firefox]
    env:
      CEB_CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Pin Chrome 137 + matching chromedriver — Chrome 150 headless silently ignores goog:chromeOptions.extensions
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 137
          install-chromedriver: true
      - name: Put chromedriver 137 on PATH ahead of system chromedriver
        run: |
          cd "$(dirname "${{ steps.setup-chrome.outputs.chromedriver-path }}")"
          pwd >> "$GITHUB_PATH"
      - run: pnpm install --frozen-lockfile --prefer-offline
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
      - run: pnpm ${{ matrix.browser == 'chrome' && 'e2e' || 'e2e:firefox' }}
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
